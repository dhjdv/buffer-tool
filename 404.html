<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>504 Gateway Timeout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Slate 900 */
            color: #f8fafc; /* Slate 50 */
            overscroll-behavior: none; /* Prevent pull-to-refresh on mobile */
        }
        .pixel-font {
            font-family: 'Press Start 2P', cursive;
        }
        #game-container {
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
            image-rendering: pixelated;
        }
        canvas {
            touch-action: none; /* Prevent scrolling when touching canvas */
        }
        .d-pad-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.1s;
        }
        .d-pad-btn:active {
            background: rgba(16, 185, 129, 0.5);
            transform: scale(0.95);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- 404 Header -->
    <div class="text-center mb-6">
        <h1 class="text-6xl md:text-8xl font-extrabold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-500 mb-2">
            504 Gateway Timeout
        </h1>
        <p class="text-xl md:text-2xl text-slate-300 font-semibold mb-2">Looks like you're lost.</p>
        <p class="text-slate-400 text-sm md:text-base max-w-md mx-auto">
            The server took too long to respond, and the connection was closed before a response could be received. But since you're here, why not play a quick game of Snake?
        </p>
    </div>

    <!-- Game Area -->
    <div class="relative w-full max-w-[400px]">
        <!-- Score Board -->
        <div class="flex justify-between items-center mb-2 px-1">
            <div class="pixel-font text-emerald-400 text-xs md:text-sm">SCORE:<span id="score">0</span></div>
            <div class="pixel-font text-slate-400 text-xs md:text-sm">HIGH:<span id="highScore">0</span></div>
        </div>

        <!-- Canvas Container -->
        <div class="relative bg-slate-800 rounded-lg overflow-hidden border-2 border-slate-700" id="game-container">
            <canvas id="gameCanvas" width="400" height="400" class="w-full h-auto block"></canvas>
            
            <!-- Overlays -->
            <div id="startOverlay" class="absolute inset-0 bg-slate-900/80 flex flex-col items-center justify-center z-10 backdrop-blur-sm transition-opacity duration-300">
                <button id="startBtn" class="px-6 py-3 bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold rounded-full transition-transform hover:scale-105 active:scale-95 shadow-lg shadow-emerald-500/30">
                    PLAY SNAKE
                </button>
                <p class="text-slate-400 text-xs mt-4 hidden sm:block">Use Arrow Keys</p>
            </div>

            <div id="gameOverOverlay" class="absolute inset-0 bg-slate-900/90 flex flex-col items-center justify-center z-20 backdrop-blur-md hidden">
                <h2 class="pixel-font text-red-500 text-xl mb-2">GAME OVER</h2>
                <p class="text-slate-300 mb-6">You scored: <span id="finalScore" class="font-bold text-emerald-400 text-lg">0</span></p>
                <button id="restartBtn" class="px-6 py-3 bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold rounded-full transition-transform hover:scale-105 active:scale-95 shadow-lg shadow-emerald-500/30">
                    PLAY AGAIN
                </button>
            </div>
        </div>

        <!-- Mobile Controls (D-Pad) -->
        <div class="mt-6 sm:hidden">
            <div class="grid grid-cols-3 gap-2 w-48 mx-auto">
                <div></div>
                <button class="d-pad-btn rounded-t-xl h-14 flex items-center justify-center text-2xl" id="btn-up">↑</button>
                <div></div>
                <button class="d-pad-btn rounded-l-xl h-14 flex items-center justify-center text-2xl" id="btn-left">←</button>
                <button class="d-pad-btn rounded-lg h-14 flex items-center justify-center text-2xl" id="btn-down">↓</button>
                <button class="d-pad-btn rounded-r-xl h-14 flex items-center justify-center text-2xl" id="btn-right">→</button>
            </div>
        </div>
    </div>

    <!-- Return Home Link -->
    <a href="https://dhjdv.github.io/web/" class="mt-8 text-slate-400 hover:text-emerald-400 transition-colors flex items-center gap-2 text-sm font-medium">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        Return to Homepage
    </a>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const finalScoreElement = document.getElementById('finalScore');
        const startOverlay = document.getElementById('startOverlay');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');

        // Game constants
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        const gameSpeed = 100; // ms per frame

        // Colors
        const colorSnakeHead = '#10b981'; // Emerald 500
        const colorSnakeBody = '#34d399'; // Emerald 400
        const colorFood = '#f43f5e';      // Rose 500
        const colorBg = '#1e293b';        // Slate 800
        const colorGrid = '#334155';      // Slate 700

        // Game state
        let snake = [];
        let food = { x: 0, y: 0 };
        let dx = 0;
        let dy = 0;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoopTimeout;
        let isPlaying = false;
        let nextDx = 0; // Buffer next move to prevent reverse deaths
        let nextDy = 0;

        highScoreElement.textContent = highScore;

        function initGame() {
            // Initial snake: 3 parts, starting in the middle
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            dx = 1;
            dy = 0;
            nextDx = 1;
            nextDy = 0;
            score = 0;
            updateScoreDisplay();
            placeFood();
            isPlaying = true;
            startOverlay.classList.add('hidden');
            gameOverOverlay.classList.add('hidden');
            
            if (gameLoopTimeout) clearTimeout(gameLoopTimeout);
            gameLoop();
        }

        function placeFood() {
            let validPosition = false;
            while (!validPosition) {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
                // Make sure food doesn't spawn on the snake
                validPosition = !snake.some(segment => segment.x === food.x && segment.y === food.y);
            }
        }

        function gameLoop() {
            if (!isPlaying) return;

            // Apply buffered move
            dx = nextDx;
            dy = nextDy;

            // Calculate new head position
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Check Game Over conditions
            if (isGameOver(head)) {
                handleGameOver();
                return;
            }

            // Move snake
            snake.unshift(head);

            // Check food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                updateScoreDisplay();
                placeFood();
            } else {
                snake.pop(); // Remove tail if no food eaten
            }

            draw();
            gameLoopTimeout = setTimeout(gameLoop, gameSpeed);
        }

        function isGameOver(head) {
            // Wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                return true;
            }
            // Self collision
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    return true;
                }
            }
            return false;
        }

        function handleGameOver() {
            isPlaying = false;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreElement.textContent = highScore;
            }
            finalScoreElement.textContent = score;
            gameOverOverlay.classList.remove('hidden');
        }

        function updateScoreDisplay() {
            scoreElement.textContent = score;
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = colorBg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw subtle grid (optional, can be removed for cleaner look)
            ctx.strokeStyle = colorGrid;
            ctx.lineWidth = 0.5;
            for(let i=0; i<=canvas.width; i+=gridSize) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }

            // Draw Food (Apple)
            ctx.fillStyle = colorFood;
            // Draw a rounded rectangle for food
            drawRoundedRect(ctx, food.x * gridSize + 2, food.y * gridSize + 2, gridSize - 4, gridSize - 4, 4);

            // Draw Snake
            snake.forEach((segment, index) => {
                ctx.fillStyle = index === 0 ? colorSnakeHead : colorSnakeBody;
                drawRoundedRect(ctx, segment.x * gridSize + 1, segment.y * gridSize + 1, gridSize - 2, gridSize - 2, 4);
            });
        }

        // Helper function for rounded rectangles
        function drawRoundedRect(ctx, x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
            ctx.fill();
        }

        // Input handling
        function changeDirection(newDx, newDy) {
            // Prevent 180-degree turns
            if ((newDx === 1 && dx === -1) || 
                (newDx === -1 && dx === 1) || 
                (newDy === 1 && dy === -1) || 
                (newDy === -1 && dy === 1)) {
                return;
            }
            nextDx = newDx;
            nextDy = newDy;
            
            // Start game on first key press if not playing and not game over
            if (!isPlaying && startOverlay.classList.contains('hidden') === false) {
                initGame();
            }
        }

        window.addEventListener('keydown', e => {
            // Prevent default scrolling for arrow keys
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
                e.preventDefault();
            }

            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    changeDirection(0, -1); break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    changeDirection(0, 1); break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    changeDirection(-1, 0); break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    changeDirection(1, 0); break;
                case 'Enter':
                case ' ':
                    if (!isPlaying) initGame(); break;
            }
        });

        // Mobile Button Listeners
        document.getElementById('btn-up').addEventListener('touchstart', (e) => { e.preventDefault(); changeDirection(0, -1); });
        document.getElementById('btn-down').addEventListener('touchstart', (e) => { e.preventDefault(); changeDirection(0, 1); });
        document.getElementById('btn-left').addEventListener('touchstart', (e) => { e.preventDefault(); changeDirection(-1, 0); });
        document.getElementById('btn-right').addEventListener('touchstart', (e) => { e.preventDefault(); changeDirection(1, 0); });
        
        // Also allow clicks on mobile buttons for testing on desktop
        document.getElementById('btn-up').addEventListener('click', () => changeDirection(0, -1));
        document.getElementById('btn-down').addEventListener('click', () => changeDirection(0, 1));
        document.getElementById('btn-left').addEventListener('click', () => changeDirection(-1, 0));
        document.getElementById('btn-right').addEventListener('click', () => changeDirection(1, 0));

        // Initial Draw
        draw();

        // Button Listeners
        startBtn.addEventListener('click', initGame);
        restartBtn.addEventListener('click', initGame);

    </script>
</body>
</html>
